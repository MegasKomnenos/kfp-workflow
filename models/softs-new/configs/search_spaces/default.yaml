profile: default
parameters:
  - name: d_model
    type: categorical
    values: [32, 64, 128]
  - name: d_core
    type: categorical
    values: [16, 32, 64]
  - name: d_ff
    type: categorical
    values: [128, 256, 512]
  - name: e_layers
    type: categorical
    values: [1, 2, 3]
  - name: dropout
    type: categorical
    values: [0.0, 0.1, 0.2, 0.3]
  - name: activation
    type: categorical
    values: [relu, gelu]
  - name: use_norm
    type: categorical
    values: [false, true]
