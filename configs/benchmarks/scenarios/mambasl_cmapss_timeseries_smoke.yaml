kind: inline
dataset:
  kind: cmapss-timeseries
  config:
    fd:
      - fd_name: FD001
        unit_ids:
          - 1
          - 2
          - 3
        max_sections: 50
    feature_mode: settings_plus_sensors
    norm_mode: condition_minmax
pipeline:
  kind: sequential-replay
  config:
    interval_hz: 1.0
    request_timeout: 30
