metadata:
  name: mambasl-cmapss-hpo
  description: MambaSL C-MAPSS FD001 hyperparameter optimisation
  version: v1

runtime:
  namespace: kubeflow-user-example-com
  image: kfp-workflow:latest
  use_gpu: false
  torch_num_threads: 2
  resources:
    cpu_request: "2"
    memory_request: 4Gi

storage:
  data_pvc: dataset-store
  model_pvc: model-store
  data_mount_path: /mnt/data
  model_mount_path: /mnt/models

model:
  name: mambasl-cmapss
  version: v1
  config: {}                   # base config populated by plugin's hpo_base_config()

dataset:
  name: cmapss
  version: v1
  config:
    fd:
      - fd_name: FD001
    feature_mode: settings_plus_sensors
    norm_mode: condition_minmax

train:
  seed: 42
  max_epochs: 30
  patience: 5
  selection_metric: rmse
  score_weight: 0.01

hpo:
  algorithm: tpe
  max_trials: 200
  max_failed_trials: 10
  parallel_trials: 2
  builtin_profile: custom
  search_space:
    # --- Architecture: model capacity ---
    - name: d_model
      type: categorical
      values: [16, 32, 48, 64, 96, 128, 192, 256]
    - name: d_state
      type: categorical
      values: [2, 4, 8, 16, 24, 32, 48, 64]
    - name: d_conv
      type: categorical
      values: [1, 2, 3, 4, 5, 6]
    - name: expand
      type: categorical
      values: [1, 2, 3, 4]
    # --- Embedding: conv token kernel ---
    - name: num_kernels
      type: categorical
      values: [0, 1, 3, 5, 7, 9, 11]
    # --- Selective SSM flags ---
    - name: tv_dt
      type: categorical
      values: [false, true]
    - name: tv_B
      type: categorical
      values: [false, true]
    - name: tv_C
      type: categorical
      values: [false, true]
    - name: use_D
      type: categorical
      values: [false, true]
    # --- Head / regularisation ---
    - name: projection
      type: categorical
      values: ["last", "avg", "full"]
    - name: dropout
      type: categorical
      values: [0.0, 0.05, 0.1, 0.15, 0.2, 0.25, 0.3, 0.4, 0.5]
    # --- Training: optimiser ---
    - name: batch_size
      type: categorical
      values: [16, 32, 64, 128, 256, 512]
    - name: lr
      type: log_float
      low: 5.0e-5
      high: 5.0e-2
    - name: weight_decay
      type: log_float
      low: 1.0e-8
      high: 1.0e-1
    # --- Training: loss ---
    - name: huber_delta
      type: categorical
      values: [0.1, 0.25, 0.5, 1.0, 2.0, 5.0, 10.0, 20.0]
    # --- Data windowing ---
    - name: window_size
      type: categorical
      values: [10, 15, 20, 25, 30, 35, 40, 45, 50, 60, 70, 80, 100]
    - name: max_rul
      type: categorical
      values: [80.0, 90.0, 100.0, 110.0, 115.0, 120.0, 125.0, 130.0, 140.0, 150.0, 175.0, 200.0]
