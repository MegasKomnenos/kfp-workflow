metadata:
  name: sample-serving
  description: Sample KServe InferenceService spec
  version: v1

namespace: kubeflow-user-example-com
model_name: sample-pytorch-model
model_version: v1
model_pvc: model-store
model_subpath: sample-pytorch-model/v1
runtime: kserve-torchserve
replicas: 1

resources:
  cpu_request: "2"
  cpu_limit: "2"
  memory_request: 4Gi
  memory_limit: 4Gi
  gpu_request: "0"
  gpu_limit: "0"
