metadata:
  name: mambasl-cmapss-serving
  description: MambaSL C-MAPSS custom KServe InferenceService
  version: v1

namespace: kubeflow-user-example-com
model_name: mambasl-cmapss
model_version: v1
model_pvc: model-store
model_subpath: mambasl-cmapss/v1
runtime: custom
predictor_image: kfp-workflow:latest
replicas: 1

resources:
  cpu_request: "2"
  cpu_limit: "2"
  memory_request: 4Gi
  memory_limit: 4Gi
  gpu_request: "0"
  gpu_limit: "0"
